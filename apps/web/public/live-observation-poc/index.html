<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Traffic Test</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <section class="traffic-card" aria-labelledby="page-title">
        <p class="eyebrow">SketchCatch · Live Observation</p>
        <h1 id="page-title">Live Traffic Test</h1>
        <p class="description">버튼을 누르면 CloudFront → ALB → EC2 요청 결과를 SketchCatch에 기록합니다.</p>
        <button id="send-traffic" type="button">요청 보내기</button>
        <p id="traffic-status" class="status" role="status" aria-live="polite" aria-atomic="true">
          관측 링크를 확인하는 중입니다.
        </p>
      </section>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
</html>
